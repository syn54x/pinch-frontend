name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: extractions/setup-just@v2
      - run: pnpm install --frozen-lockfile
      - run: just check
      - run: just check-drift
      - run: pnpm build

  # The walking skeleton's definition of done: the full Playwright suite
  # against a real backend (checked out at the SHA pinned in e2e/backend.pin
  # — bumping it is a reviewable diff) and a fresh Postgres.
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - id: pin
        run: echo "sha=$(tr -d '[:space:]' < e2e/backend.pin)" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          repository: syn54x/pinch-backend
          ref: ${{ steps.pin.outputs.sha }}
          path: pinch-backend
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: extractions/setup-just@v2
      - uses: astral-sh/setup-uv@v5
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      # Pre-warm the backend env so the Playwright webServer boot isn't
      # racing its timeout against uv's first-run downloads.
      - run: uv sync
        working-directory: pinch-backend
      # Enforce the contract-seam twinning: the committed openapi.json (and
      # its generated client) must match what the PINNED backend exports —
      # a pin bump that changes the API forces a regen in the same PR.
      - run: just openapi-sync ./pinch-backend
      - run: git diff --exit-code openapi.json src/api/generated
      - run: pnpm exec playwright test
        env:
          E2E_BACKEND_DIR: ${{ github.workspace }}/pinch-backend
          E2E_DB_MODE: direct
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report
