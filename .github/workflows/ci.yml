name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: extractions/setup-just@v2
      - run: pnpm install --frozen-lockfile
      - run: just check
      - run: just check-drift
      - run: pnpm build
